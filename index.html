<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>DecentraVision XR</title>

    <style>
        body {
            margin: 0;
            background: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        .menu {
            text-align: center;
            padding: 40px;
            border: 2px solid cyan;
            border-radius: 20px;
            background: rgba(0,0,0,0.8);
        }

        h1 {
            color: cyan;
        }

        button {
            margin-top: 20px;
            padding: 18px 35px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: cyan;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="menu">

    <h1>DecentraVision XR</h1>

    <p>
        Blockchain + Cryptography +
        DeFi + ML Analysis
    </p>

    <button id="start-btn">
        Увійти до AR
    </button>

</div>

<script>
document
.getElementById("start-btn")
.addEventListener("click", () => {

    window.location.href =
        "xr.html";
});
</script>

</body>
</html>
