<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>XR Scene</title>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
        "three/addons/":
        "https://unpkg.com/three@0.160.1/examples/jsm/"
    }
}
</script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
    background:rgba(0,0,0,.7);
    padding:15px;
    color:white;
    border:1px solid cyan;
    border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
    <h2>DecentraVision XR</h2>

    <input
        id="messageInput"
        type="text"
        placeholder="Введіть повідомлення"
        style="width:220px;margin-bottom:5px;"
    >

    <br>

    <button id="sendBtn">
        Надіслати через Blockchain
    </button>

    <button id="disableBtn">
        Вимкнути блок 3
    </button>

    <div id="status" style="margin-top:10px;">
        Очікування...
    </div>

    <div id="tx">
        Transactions: 0
    </div>

    <div id="ml">
        ML: Waiting...
    </div>
</div>

<script type="module">

import * as THREE from 'three';
import { OrbitControls }
from 'three/addons/controls/OrbitControls.js';

const scene =
    new THREE.Scene();

scene.background =
    new THREE.Color(0x050510);

const camera =
    new THREE.PerspectiveCamera(
        75,
        innerWidth / innerHeight,
        0.1,
        1000
    );

camera.position.set(0,4,10);

const renderer =
    new THREE.WebGLRenderer({
        antialias:true
    });

renderer.setSize(
    innerWidth,
    innerHeight
);

document.body
.appendChild(renderer.domElement);

const controls =
    new OrbitControls(
        camera,
        renderer.domElement
    );

controls.enableDamping = true;

// light
scene.add(
    new THREE.AmbientLight(
        0xffffff,
        1
    )
);

const light =
    new THREE.PointLight(
        0x00ffff,
        3
    );

light.position.set(5,5,5);
scene.add(light);

// blockchain
const chain = [];
const blockData = [];
for(let i=0;i<5;i++){

    const block =
        new THREE.Mesh(

            new THREE.BoxGeometry(),

            new THREE.MeshPhongMaterial({
                color:0x00ffff,
                wireframe:true
            })
        );

    block.position.x =
        i * 2 - 4;

    scene.add(block);

block.userData = {
    active:true,
    storedData:""
};

chain.push(block);
blockData.push("");
}

// defi nodes
const nodes = [];

[
[-5,3,0x00ff00],
[0,3,0xffff00],
[5,3,0xff00ff]

].forEach(n=>{

    const sphere =
        new THREE.Mesh(

            new THREE.SphereGeometry(.5),

            new THREE.MeshPhongMaterial({
                color:n[2]
            })
        );

    sphere.position.set(
        n[0],
        n[1],
        0
    );

    scene.add(sphere);
    nodes.push(sphere);
});

// tx particle
const txSphere =
    new THREE.Mesh(

        new THREE.SphereGeometry(.15),

        new THREE.MeshBasicMaterial({
            color:0xffffff
        })
    );

scene.add(txSphere);
function simpleHash(text){

    let hash = 0;

    for(let i=0;i<text.length;i++){

        hash =
        ((hash << 5) - hash)
        + text.charCodeAt(i);

        hash |= 0;
    }

    return Math.abs(hash).toString();
}

let transferIndex = -1;
let currentMessage = "";

document
.getElementById("sendBtn")
.addEventListener("click",()=>{

    currentMessage =
        document
        .getElementById("messageInput")
        .value;

    if(!currentMessage) return;

    transferIndex = 0;

    document
    .getElementById("status")
    .innerText =
    "Передача розпочата";
});

document
.getElementById("disableBtn")
.addEventListener("click",()=>{

    const block = chain[2];

    block.userData.active =
        !block.userData.active;

    block.material.color.set(
        block.userData.active
        ? 0x00ffff
        : 0xff0000
    );

    document
    .getElementById("status")
    .innerText =
        block.userData.active
        ? "Блок 3 увімкнено"
        : "Блок 3 вимкнено";
});
let progress = 0;
let txCount = 0;

function animate(){

    requestAnimationFrame(
        animate
    );

    chain.forEach(block=>{
        block.rotation.y += 0.01;
    });

    progress += 0.01;

    if(progress >= 1){

        progress = 0;

        txCount++;

        document
        .getElementById("tx")
        .innerText =
        "Transactions: " +
        txCount;

        const suspicious =
            Math.random() > 0.7;

        txSphere.material.color.set(
            suspicious
            ? 0xff0000
            : 0x00ff00
        );

        document
        .getElementById("ml")
        .innerText =
        suspicious
        ? "ML: Suspicious"
        : "ML: Normal";
    }

    txSphere.position
    .lerpVectors(
        nodes[0].position,
        nodes[2].position,
        progress
    );

    if(
    transferIndex >= 0 &&
    transferIndex < chain.length
){

    const block =
        chain[transferIndex];

    if(!block.userData.active){

        document
        .getElementById("status")
        .innerText =
        "Передача зупинена на блоці "
        + (transferIndex + 1);

        transferIndex = -1;
    }
    else{

        const incomingData =
            transferIndex === 0
            ? currentMessage
            : blockData[transferIndex - 1];

        const hashed =
            simpleHash(incomingData);

        blockData[transferIndex] =
            hashed;

        block.scale.set(
            1.3,
            1.3,
            1.3
        );

        setTimeout(()=>{

            block.scale.set(
                1,
                1,
                1
            );

        },200);

        document
        .getElementById("status")
        .innerText =
            "Блок "
            + (transferIndex + 1)
            + " отримав дані: "
            + hashed;

        transferIndex++;
    }

    if(
        transferIndex === chain.length
    ){

        document
        .getElementById("status")
        .innerText =
        "Передачу завершено. Фінальний хеш: "
        + blockData[
            chain.length - 1
        ];

        transferIndex = -1;
    }
}
    controls.update();

    renderer.render(
        scene,
        camera
    );
}

animate();

addEventListener(
    "resize",
    ()=>{

    camera.aspect =
        innerWidth /
        innerHeight;

    camera
    .updateProjectionMatrix();

    renderer.setSize(
        innerWidth,
        innerHeight
    );
});

</script>

</body>
</html>
